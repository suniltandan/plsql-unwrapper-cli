stages:
  - build
  - release

variables:
  CARGO_HOME: "${CI_PROJECT_DIR}/.cargo"

# -----------------------------------------------------------
# Build jobs — one per target platform
# -----------------------------------------------------------

build:linux-x86_64:
  stage: build
  image: rust:latest
  script:
    - rustup target add x86_64-unknown-linux-gnu
    - cargo build --release --target x86_64-unknown-linux-gnu
    - mkdir -p artifacts
    - cp target/x86_64-unknown-linux-gnu/release/unwrap artifacts/unwrap-linux-x86_64
  artifacts:
    paths:
      - artifacts/unwrap-linux-x86_64
  rules:
    - if: $CI_COMMIT_TAG

build:linux-aarch64:
  stage: build
  image: rust:latest
  before_script:
    - apt-get update -qq && apt-get install -y -qq gcc-aarch64-linux-gnu
    - rustup target add aarch64-unknown-linux-gnu
  script:
    - export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
    - cargo build --release --target aarch64-unknown-linux-gnu
    - mkdir -p artifacts
    - cp target/aarch64-unknown-linux-gnu/release/unwrap artifacts/unwrap-linux-aarch64
  artifacts:
    paths:
      - artifacts/unwrap-linux-aarch64
  rules:
    - if: $CI_COMMIT_TAG

build:macos-x86_64:
  stage: build
  image: rust:latest
  tags:
    - macos
  script:
    - rustup target add x86_64-apple-darwin
    - cargo build --release --target x86_64-apple-darwin
    - mkdir -p artifacts
    - cp target/x86_64-apple-darwin/release/unwrap artifacts/unwrap-macos-x86_64
  artifacts:
    paths:
      - artifacts/unwrap-macos-x86_64
  rules:
    - if: $CI_COMMIT_TAG

build:macos-aarch64:
  stage: build
  image: rust:latest
  tags:
    - macos
  script:
    - rustup target add aarch64-apple-darwin
    - cargo build --release --target aarch64-apple-darwin
    - mkdir -p artifacts
    - cp target/aarch64-apple-darwin/release/unwrap artifacts/unwrap-macos-aarch64
  artifacts:
    paths:
      - artifacts/unwrap-macos-aarch64
  rules:
    - if: $CI_COMMIT_TAG

build:windows-x86_64:
  stage: build
  image: rust:latest
  before_script:
    - apt-get update -qq && apt-get install -y -qq gcc-mingw-w64-x86-64
    - rustup target add x86_64-pc-windows-gnu
  script:
    - cargo build --release --target x86_64-pc-windows-gnu
    - mkdir -p artifacts
    - cp target/x86_64-pc-windows-gnu/release/unwrap.exe artifacts/unwrap-windows-x86_64.exe
  artifacts:
    paths:
      - artifacts/unwrap-windows-x86_64.exe
  rules:
    - if: $CI_COMMIT_TAG

# -----------------------------------------------------------
# Release job — creates a GitLab release with all binaries
# -----------------------------------------------------------

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - build:linux-x86_64
    - build:linux-aarch64
    - build:windows-x86_64
  script:
    - echo "Creating release ${CI_COMMIT_TAG}"
  release:
    tag_name: ${CI_COMMIT_TAG}
    name: "unwrap ${CI_COMMIT_TAG}"
    description: |
      ## Downloads

      | Platform | Binary |
      |---|---|
      | Linux x86_64 | unwrap-linux-x86_64 |
      | Linux aarch64 | unwrap-linux-aarch64 |
      | Windows x86_64 | unwrap-windows-x86_64.exe |

      ### macOS
      macOS builds require a runner with `macos` tag. Build from source: `cargo build --release`
    assets:
      links:
        - name: unwrap-linux-x86_64
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/artifacts/unwrap-linux-x86_64?job=build:linux-x86_64"
          filepath: /binaries/unwrap-linux-x86_64
        - name: unwrap-linux-aarch64
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/artifacts/unwrap-linux-aarch64?job=build:linux-aarch64"
          filepath: /binaries/unwrap-linux-aarch64
        - name: unwrap-windows-x86_64.exe
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/artifacts/unwrap-windows-x86_64.exe?job=build:windows-x86_64"
          filepath: /binaries/unwrap-windows-x86_64.exe
  rules:
    - if: $CI_COMMIT_TAG
