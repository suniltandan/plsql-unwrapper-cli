name: Release

on:
  push:
    tags:
      - 'v*' # Trigger on tags matching v*, i.e. v1.0.0

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: unwrap-linux-x86_64
            extension: ""
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: unwrap-linux-aarch64
            extension: ""
            use_cross: true
          - target: x86_64-apple-darwin
            os: macos-13
            artifact_name: unwrap-macos-x86_64
            extension: ""
          - target: aarch64-apple-darwin
            os: macos-14
            artifact_name: unwrap-macos-aarch64
            extension: ""
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact_name: unwrap-windows-x86_64.exe
            extension: .exe
            
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (if needed)
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (native)
        if: ${{ !matrix.use_cross }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Copy and rename artifact (Bash)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p artifacts
          cp target/${{ matrix.target }}/release/unwrap${{ matrix.extension }} artifacts/${{ matrix.artifact_name }}

      - name: Copy and rename artifact (PowerShell)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts
          Copy-Item target\${{ matrix.target }}\release\unwrap${{ matrix.extension }} -Destination artifacts\${{ matrix.artifact_name }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: artifacts/${{ matrix.artifact_name }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Display downloaded files
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
